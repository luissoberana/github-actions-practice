name: Pipeline Proyecto Real

on:
  push:

jobs:
  proyecto-node:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verificar versión de Node
        run: node --version

      - name: Intentar instalar dependencias
        run: npm install

      - name: Este paso debería detenerse
        run: echo "El pipeline continuó"