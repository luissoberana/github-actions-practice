name: Pipeline Inteligente

on:
  push:

jobs:
  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm comando-falso

      - name: Validación exitosa
        run: echo "Validación completada"

  despliegue:
    needs: validar
    runs-on: ubuntu-latest

    steps:
      - name: Simular despliegue
        run: echo "Desplegando aplicación..."